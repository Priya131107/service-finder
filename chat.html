<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Smart Service Platform</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .chat-container {
            max-width: 600px;
            margin: 2rem auto;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .chat-header {
            padding: 1.5rem;
            background: var(--primary);
            color: white;
            border-radius: var(--radius) var(--radius) 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: var(--bg-color);
        }

        .msg-bubble {
            max-width: 70%;
            padding: 0.8rem 1.2rem;
            border-radius: 18px;
            line-height: 1.4;
        }

        .msg-received {
            background: white;
            align-self: flex-start;
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .msg-sent {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-input {
            padding: 1.5rem;
            background: white;
            border-top: 1px solid var(--border);
            border-radius: 0 0 var(--radius) var(--radius);
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Smart<span>Service</span></a>
        <nav>
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="dashboard.html">Dashboard</a>
        </nav>
    </header>

    <div class="chat-container fade-in">
        <div class="chat-header">
            <h3 id="chatTitle">Messaging...</h3>
        </div>
        
        <div class="chat-messages" id="msgs">
            <p style="text-align: center; color: var(--text-muted);">Loading conversation...</p>
        </div>

        <div class="chat-input">
            <input type="text" id="msgText" class="form-control" placeholder="Type your message...">
            <button class="btn-primary" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const providerId = params.get("userId");

        if (!document.cookie.includes("userId")) {
            alert("Please login first.");
            window.location.href = "login.html";
        }

        if (providerId) {
            // Load Provider details to show in header
            fetch(`/api/providers/${providerId}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('chatTitle').innerText = data.name;
            });

            loadMessages();
            // Polling
            setInterval(loadMessages, 5000);
        }

        function loadMessages() {
            fetch(`/api/messages/${providerId}`)
            .then(res => res.json())
            .then(data => {
                const box = document.getElementById('msgs');
                box.innerHTML = '';
                
                if (data.length === 0) {
                    box.innerHTML = '<p style="text-align:center; color: var(--text-muted); width: 100%;">No messages yet. Say hi!</p>';
                    return;
                }

                // We get the current user ID from the cookie for checking sender
                const myUserId = getCookie("userId");

                data.forEach(m => {
                    const isMine = m.sender_id == myUserId;
                    const div = document.createElement('div');
                    div.className = 'msg-bubble ' + (isMine ? 'msg-sent' : 'msg-received');
                    div.innerHTML = m.message;
                    box.appendChild(div);
                });
                
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMessage() {
            const txt = document.getElementById('msgText').value;
            if (!txt) return;

            fetch('/api/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ receiver_id: providerId, message: txt })
            }).then(() => {
                document.getElementById('msgText').value = '';
                loadMessages();
            });
        }

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }
    </script>
</body>
</html>
