<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - Smart Service Platform</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        .services-layout {
            display: flex;
            padding: 2rem 5%;
            gap: 2rem;
        }

        .sidebar {
            width: 300px;
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            height: fit-content;
        }

        .sidebar h3 {
            margin-bottom: 1rem;
            color: var(--secondary);
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .filter-group {
            margin-bottom: 1.5rem;
        }

        .main-content {
            flex: 1;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .provider-card {
            background: white;
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--primary);
            transition: var(--transition);
        }
        
        .provider-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .provider-card.emergency {
            border-left-color: var(--emergency);
            background: #fef2f2;
        }

        .provider-info h4 {
            font-size: 1.25rem;
            color: var(--secondary);
        }

        .provider-info p {
            color: var(--text-muted);
            margin: 4px 0;
        }

        .rating {
            color: var(--accent);
            font-weight: bold;
        }

        #map {
            height: 300px;
            width: 100%;
            border-radius: var(--radius);
            margin-bottom: 2rem;
            z-index: 1;
        }

        .cost-estimator {
            background: #eff6ff;
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid #bfdbfe;
            margin-top: 2rem;
        }
        
        #providerList {
            min-height: 200px;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Smart<span>Service</span></a>
        <nav>
            <a href="index.html">Home</a>
            <a href="services.html" style="color: var(--primary);">Services</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="login.html" class="btn-primary" id="loginBtn">Login</a>
        </nav>
    </header>

    <div class="services-layout">
        
        <aside class="sidebar">
            <h3>Filters</h3>
            
            <div class="filter-group">
                <label class="form-group label">Category</label>
                <select id="filterCategory" class="form-control" onchange="fetchProviders()">
                    <option value="">All Categories</option>
                    <option value="Electrician">Electrician</option>
                    <option value="Plumber">Plumber</option>
                    <option value="Cleaning">Cleaning</option>
                    <option value="Tutor">Education / Tutor</option>
                </select>
            </div>
            
            <div class="filter-group" style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="filterEmergency" onchange="fetchProviders()" style="width: 20px; height: 20px;">
                <label for="filterEmergency" style="color: var(--emergency); font-weight: bold;">🚨 Emergency Only</label>
            </div>

            <div class="cost-estimator">
                <h4 style="color: var(--primary); margin-bottom: 10px;">💰 Cost Estimator</h4>
                <select id="estCategory" class="form-control" style="margin-bottom: 10px;">
                    <option value="Electrician">Electrician</option>
                    <option value="Plumber">Plumber</option>
                    <option value="Cleaning">Cleaning</option>
                </select>
                <select id="estScale" class="form-control" style="margin-bottom: 10px;">
                    <option value="Small">Small Task (1 hr)</option>
                    <option value="Medium">Medium Task (2-4 hrs)</option>
                    <option value="Large">Large Task (Full Day)</option>
                </select>
                <button class="btn-primary" style="width: 100%" onclick="calcEstimate()">Get Estimate</button>
                <p id="estimateResult" style="margin-top: 10px; font-weight: bold;"></p>
            </div>
        </aside>

        <section class="main-content">
            
            <div class="search-bar">
                <input type="text" id="searchInput" class="form-control" placeholder="Search by name or category...">
                <button class="btn-primary" onclick="fetchProviders()">Search</button>
            </div>

            <!-- Leaflet Map Container -->
            <div id="map"></div>

            <h3 style="margin-bottom: 1rem;">Service Providers</h3>
            <div id="providerList">
                <p>Loading professionals...</p>
            </div>

        </section>
    </div>

    <script>
        if (document.cookie.includes("userId")) {
            document.getElementById("loginBtn").style.display = "none";
        }

        // Initialize empty map
        let map = L.map('map').setView([26.9124, 75.7873], 12); // Jaipur coords roughly
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        let mapMarkers = [];

        // Parse URL params
        const params = new URLSearchParams(window.location.search);
        if (params.get("category")) document.getElementById('filterCategory').value = params.get("category");
        if (params.get("search")) document.getElementById('searchInput').value = params.get("search");
        if (params.get("emergency") === "true") document.getElementById('filterEmergency').checked = true;

        fetchProviders();

        function fetchProviders() {
            const search = document.getElementById('searchInput').value;
            const category = document.getElementById('filterCategory').value;
            const emergency = document.getElementById('filterEmergency').checked;

            let url = `/api/providers?search=${search}&category=${category}&emergency=${emergency}`;

            fetch(url)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('providerList');
                list.innerHTML = '';
                
                // clear old markers
                mapMarkers.forEach(m => map.removeLayer(m));
                mapMarkers = [];

                if (data.length === 0) {
                    list.innerHTML = '<p>No providers found matching your criteria.</p>';
                    return;
                }

                data.forEach((p, index) => {
                    // Create mock coordinates around Jaipur for map based on index
                    const lat = 26.9124 + (Math.random() - 0.5) * 0.1;
                    const lng = 75.7873 + (Math.random() - 0.5) * 0.1;

                    const marker = L.marker([lat, lng]).addTo(map)
                        .bindPopup(`<b>${p.name}</b><br>${p.category}<br>⭐ ${p.rating}`);
                    mapMarkers.push(marker);

                    const div = document.createElement('div');
                    div.className = `provider-card fade-in ${p.is_emergency ? 'emergency' : ''}`;
                    div.innerHTML = `
                        <div class="provider-info">
                            <h4>${p.name} ${p.is_emergency ? '<span title="Emergency Service">🚨</span>' : ''}</h4>
                            <p>${p.category} | ${p.experience} Yrs Exp.</p>
                            <p>📍 ${p.location}</p>
                            <p class="rating">⭐ ${p.rating.toFixed(1)} / 5</p>
                        </div>
                        <div class="provider-actions" style="display:flex; gap:10px; align-items:center;">
                            <a href="profile.html?id=${p.id}" class="btn-primary" style="background: var(--secondary);">View Profile</a>
                            <a href="booking.html?id=${p.id}" class="btn-primary">Book Now</a>
                        </div>
                    `;
                    list.appendChild(div);
                });
            });
        }

        function calcEstimate() {
            const category = document.getElementById('estCategory').value;
            const scale = document.getElementById('estScale').value;

            fetch(`/api/estimate?category=${category}&scale=${scale}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('estimateResult').innerText = `Estimated: ${data.estimatedCost}`;
            });
        }
    </script>
</body>
</html>
